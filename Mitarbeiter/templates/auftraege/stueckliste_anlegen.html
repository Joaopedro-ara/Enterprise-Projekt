<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stueckliste anlegen</title>
    {% if meldung %}
    <p>{{ meldung }}</p>
{% endif %}
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            background: #f3f4f6;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: #1f2d3d;
            color: white;
            padding: 20px 40px;
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 0.5px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        }

        .header a {
            color: #8b9cb0;
            text-decoration: none;
            font-size: 16px;
            font-weight: 400;
            margin-left: 30px;
            transition: color 0.2s ease;
        }

        .header a:hover {
            color: white;
        }

        .main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 40px;
        }

        .card {
            background: white;
            padding: 30px;
            width: 520px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            border: 1px solid #e5e7eb;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card h1 {
            font-size: 26px;
            margin-bottom: 20px;
            color: #1f2d3d;
            text-align: center;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        label {
            font-weight: 600;
            color: #374151;
            font-size: 14px;
        }

        input, select {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            font-size: 15px;
            background: #f9fafb;
            transition: all 0.2s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #2563eb;
            background: white;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
        }

        button {
            margin-top: 20px;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background: #2563eb;
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.1s ease;
        }

        button:hover {
            background: #1e4fd1;
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        .footer {
            text-align: center;
            font-size: 13px;
            color: #6b7280;
            margin-top: 20px;
        }


        .back-link {
            display: inline-block;
            margin-top: 15px;
            color: #2563eb;
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
            transition: color 0.2s ease;
        }

        .back-link:hover {
            color: #1e4fd1;
            text-decoration: underline;
        }

        /* --- Responsive --- */
        @media (max-width: 600px) {
            .card {
                width: 90%;
                padding: 20px;
            }
            .header {
                font-size: 18px;
                padding: 15px 20px;
            }
            .header a {
                font-size: 14px;
                margin-left: 15px;
            }
        }
    </style>
</head>
<body>
<div class="header">
    Hilde AG-ERP System
    <a href="{{ url_for('lager.rohmaterial') }}">⬅️ Zurück zur Übersicht</a>
</div>

<div class="main">
    <div class="card">
        <h1>📦 Stueckliste anlegen</h1>
        <form action="{{ url_for('lager.stueckliste') }}" method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <label for="produkt_id">uebergeordnetes produkt(produkt-id)</label>
            <input type="text" id="produkt_id" name="produkt_id" placeholder="z.B. RM-1001" required>

            <label for="mater_id">benötigtes material</label>
            <input type="text" id="mater_id" name="material_id" placeholder="z.B. Edelstahlblech 2mm" required>

            <label for="bestand">Benötigte menge</label>
            <input type="number" id="bestand" name="menge" placeholder="z.B. 1250" required>
            <button type="submit">Rezept speichern</button>
        </form>


        <div style="text-align: center; margin-top: 15px;">
            <a href="{{ url_for('lager.rohmaterial') }}" class="back-link">📋 Zur Rohmaterial-Übersicht</a>
        </div>

        <div class="footer">
            ERP – Rohmaterial anlegen · Hilde AG
        </div>
    </div>
</div>
</body>
</html>
