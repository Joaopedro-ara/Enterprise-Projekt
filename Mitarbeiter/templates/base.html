<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Hilde AG - ERP{% endblock %}</title>
    <style>
        /* Das globale CSS: Gilt für ALLE Seiten im ganzen ERP! */
        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: #eef1f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: #1f2d3d;
            color: white;
            padding: 20px 40px;
            font-size: 20px;
            font-weight: 600;
        }
        .main {
            display: flex;
            justify-content: center;
            align-items: center;
            flex: 1; /* Nimmt den restlichen Platz ein */
            padding: 20px;
        }

        /* Hier können die einzelnen Seiten ihr eigenes Spezial-CSS einfügen */
        {% block styles %}{% endblock %}
    </style>
</head>
<body>

    <div class="header">
        Hilde AG – ERP System
    </div>

    <div class="main">
        {% block content %}{% endblock %}
    </div>

</body>
</html>
